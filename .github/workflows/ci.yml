name: ClassHub CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: classhub

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1: Build + Test (xUnit + Reqnroll/BDD)
  # ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita historial completo

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependencias (NuGet)
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Tests unitarios (xUnit) con coverage
        run: |
          dotnet test tests/ClassHub.Tests/ClassHub.Tests.csproj \
            -c Release --no-build \
            --logger "trx;LogFileName=xunit-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Tests BDD (Reqnroll)
        run: |
          dotnet test tests/ClassHub.Specs/ClassHub.Specs.csproj \
            -c Release --no-build \
            --logger "trx;LogFileName=specs-results.trx" \
            --results-directory ./test-results

      - name: Subir resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results

  # ────────────────────────────────────────────────────────
  # JOB 2: Análisis de código — SonarCloud
  # ────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java (requerido por SonarCloud scanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restaurar dependencias
        run: dotnet restore

      - name: Análisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"nahiaorgon_classhub" \
            /o:"nahiaorgon" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**"
          dotnet build -c Release --no-restore
          dotnet test tests/ClassHub.Tests/ClassHub.Tests.csproj \
            -c Release --no-build \
            --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  # ────────────────────────────────────────────────────────
  # JOB 3: Docker — build y push a Docker Hub
  # ────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────
  # JOB 4: Deploy a Render
  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy en Render
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "✅ Deploy disparado en Render"
